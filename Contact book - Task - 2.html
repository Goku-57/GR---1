
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans)}
.app{min-height:600px;background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);border-radius:16px;padding:24px;color:#fff}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:40px;height:40px;background:#e94560;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:500}
.logo-text{font-size:20px;font-weight:500;color:#fff}
.logo-sub{font-size:11px;color:#a0aec0;margin-top:1px}
.add-btn{background:#e94560;color:#fff;border:none;padding:10px 20px;border-radius:10px;font-size:13px;font-weight:500;cursor:pointer;transition:all 0.2s}
.add-btn:hover{background:#c73652;transform:scale(0.98)}
.search-box{position:relative;margin-bottom:20px}
.search-box input{width:100%;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:#fff;padding:12px 16px 12px 44px;border-radius:12px;font-size:14px;outline:none;transition:all 0.2s}
.search-box input::placeholder{color:#718096}
.search-box input:focus{border-color:#e94560;background:rgba(255,255,255,0.12)}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:#718096;font-size:16px}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
.stat-card{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:14px;text-align:center}
.stat-num{font-size:22px;font-weight:500;color:#e94560}
.stat-label{font-size:11px;color:#a0aec0;margin-top:2px}
.contacts-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.contact-card{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);border-radius:14px;padding:16px;cursor:pointer;transition:all 0.2s;position:relative;overflow:hidden}
.contact-card:hover{background:rgba(255,255,255,0.12);border-color:rgba(233,69,96,0.5);transform:translateY(-2px)}
.contact-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#e94560,#533483)}
.avatar{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:500;margin-bottom:10px}
.contact-name{font-size:14px;font-weight:500;color:#fff;margin-bottom:4px}
.contact-phone{font-size:12px;color:#a0aec0;margin-bottom:2px}
.contact-email{font-size:11px;color:#718096;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card-actions{display:flex;gap:6px;margin-top:10px}
.action-btn{flex:1;padding:6px;border-radius:8px;font-size:11px;border:none;cursor:pointer;font-weight:500;transition:all 0.2s}
.edit-btn{background:rgba(83,52,131,0.5);color:#b794f4;border:1px solid rgba(183,148,244,0.3)}
.edit-btn:hover{background:rgba(83,52,131,0.8)}
.del-btn{background:rgba(233,69,96,0.2);color:#fc8181;border:1px solid rgba(252,129,129,0.3)}
.del-btn:hover{background:rgba(233,69,96,0.4)}
.empty{text-align:center;padding:40px;color:#a0aec0;font-size:14px}
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);z-index:100;align-items:center;justify-content:center}
.modal-overlay.active{display:flex}
.modal{background:#1a1a2e;border:1px solid rgba(255,255,255,0.15);border-radius:20px;padding:28px;width:380px;max-width:95vw}
.modal h3{color:#fff;font-size:17px;font-weight:500;margin-bottom:20px;display:flex;align-items:center;gap:8px}
.modal h3 span{color:#e94560;font-size:20px}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;color:#a0aec0;margin-bottom:6px;font-weight:500;letter-spacing:0.5px}
.field input,.field textarea{width:100%;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:#fff;padding:10px 14px;border-radius:10px;font-size:13px;outline:none;transition:border-color 0.2s;font-family:var(--font-sans)}
.field input:focus,.field textarea:focus{border-color:#e94560}
.field textarea{resize:none;height:70px}
.modal-btns{display:flex;gap:10px;margin-top:20px}
.save-btn{flex:1;background:#e94560;color:#fff;border:none;padding:11px;border-radius:10px;font-size:13px;font-weight:500;cursor:pointer;transition:all 0.2s}
.save-btn:hover{background:#c73652}
.cancel-btn{flex:1;background:rgba(255,255,255,0.08);color:#a0aec0;border:1px solid rgba(255,255,255,0.15);padding:11px;border-radius:10px;font-size:13px;cursor:pointer;transition:all 0.2s}
.cancel-btn:hover{background:rgba(255,255,255,0.15);color:#fff}
.toast{position:fixed;bottom:24px;right:24px;background:#e94560;color:#fff;padding:10px 18px;border-radius:10px;font-size:13px;z-index:200;opacity:0;transform:translateY(10px);transition:all 0.3s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
</style>
<div class="app">
  <div class="header">
    <div class="logo">
      <div class="logo-icon">C</div>
      <div>
        <div class="logo-text">ContactVault</div>
        <div class="logo-sub">Your personal directory</div>
      </div>
    </div>
    <button class="add-btn" onclick="openModal()">+ Add Contact</button>
  </div>
  <div class="search-box">
    <span class="search-icon">&#9906;</span>
    <input type="text" id="searchInput" placeholder="Search by name or phone..." oninput="renderContacts()">
  </div>
  <div class="stats">
    <div class="stat-card"><div class="stat-num" id="totalCount">0</div><div class="stat-label">Total</div></div>
    <div class="stat-card"><div class="stat-num" id="recentCount">0</div><div class="stat-label">Recent</div></div>
    <div class="stat-card"><div class="stat-num" id="searchCount">0</div><div class="stat-label">Found</div></div>
  </div>
  <div class="contacts-grid" id="contactsGrid"></div>
  <div id="emptyState" class="empty" style="display:none">No contacts found. Add your first contact!</div>
</div>
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3><span>&#9998;</span> <span id="modalTitle">New Contact</span></h3>
    <div class="field"><label>FULL NAME</label><input type="text" id="fName" placeholder="Enter full name"></div>
    <div class="field"><label>PHONE NUMBER</label><input type="text" id="fPhone" placeholder="+91 00000 00000"></div>
    <div class="field"><label>EMAIL ADDRESS</label><input type="text" id="fEmail" placeholder="name@email.com"></div>
    <div class="field"><label>ADDRESS</label><textarea id="fAddress" placeholder="Street, City, State..."></textarea></div>
    <div class="modal-btns">
      <button class="cancel-btn" onclick="closeModal()">Cancel</button>
      <button class="save-btn" onclick="saveContact()">Save Contact</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
const colors=[
  {bg:'rgba(233,69,96,0.2)',text:'#fc8181'},
  {bg:'rgba(83,52,131,0.3)',text:'#b794f4'},
  {bg:'rgba(29,158,117,0.2)',text:'#68d391'},
  {bg:'rgba(246,173,85,0.2)',text:'#f6ad55'},
  {bg:'rgba(56,178,172,0.2)',text:'#81e6d9'},
  {bg:'rgba(66,153,225,0.2)',text:'#90cdf4'},
];
let contacts=[
  {id:1,name:'Arun Kumar',phone:'+91 98765 43210',email:'arun@gmail.com',address:'Anna Nagar, Chennai',color:0},
  {id:2,name:'Priya Devi',phone:'+91 87654 32109',email:'priya@gmail.com',address:'T Nagar, Chennai',color:1},
  {id:3,name:'Vikram S',phone:'+91 76543 21098',email:'vikram@gmail.com',address:'Coimbatore, TN',color:2},
];
let editId=null;

function initials(n){return n.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);}

function renderContacts(){
  const q=document.getElementById('searchInput').value.toLowerCase();
  const filtered=contacts.filter(c=>c.name.toLowerCase().includes(q)||c.phone.includes(q));
  const grid=document.getElementById('contactsGrid');
  const empty=document.getElementById('emptyState');
  document.getElementById('totalCount').textContent=contacts.length;
  document.getElementById('recentCount').textContent=Math.min(contacts.length,3);
  document.getElementById('searchCount').textContent=filtered.length;
  if(filtered.length===0){grid.innerHTML='';empty.style.display='block';return;}
  empty.style.display='none';
  grid.innerHTML=filtered.map(c=>`
    <div class="contact-card">
      <div class="avatar" style="background:${colors[c.color%colors.length].bg};color:${colors[c.color%colors.length].text}">${initials(c.name)}</div>
      <div class="contact-name">${c.name}</div>
      <div class="contact-phone">${c.phone}</div>
      <div class="contact-email">${c.email}</div>
      <div class="card-actions">
        <button class="action-btn edit-btn" onclick="openEdit(${c.id})">Edit</button>
        <button class="action-btn del-btn" onclick="deleteContact(${c.id})">Delete</button>
      </div>
    </div>`).join('');
}

function openModal(reset=true){
  if(reset){editId=null;document.getElementById('modalTitle').textContent='New Contact';['fName','fPhone','fEmail','fAddress'].forEach(f=>document.getElementById(f).value='');}
  document.getElementById('modalOverlay').classList.add('active');
}

function closeModal(){document.getElementById('modalOverlay').classList.remove('active');}

function openEdit(id){
  const c=contacts.find(x=>x.id===id);if(!c)return;
  editId=id;
  document.getElementById('modalTitle').textContent='Edit Contact';
  document.getElementById('fName').value=c.name;
  document.getElementById('fPhone').value=c.phone;
  document.getElementById('fEmail').value=c.email;
  document.getElementById('fAddress').value=c.address;
  openModal(false);
}

function saveContact(){
  const name=document.getElementById('fName').value.trim();
  const phone=document.getElementById('fPhone').value.trim();
  const email=document.getElementById('fEmail').value.trim();
  const address=document.getElementById('fAddress').value.trim();
  if(!name||!phone){showToast('Name and phone required!');return;}
  if(editId){
    const c=contacts.find(x=>x.id===editId);
    if(c){Object.assign(c,{name,phone,email,address});}
    showToast('Contact updated!');
  }else{
    contacts.push({id:Date.now(),name,phone,email,address,color:contacts.length});
    showToast('Contact added!');
  }
  closeModal();renderContacts();
}

function deleteContact(id){
  contacts=contacts.filter(x=>x.id!==id);
  renderContacts();showToast('Contact deleted!');
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

document.getElementById('modalOverlay').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal();});
renderContacts();
</script>
