<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AURA — Task Universe</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Serif+Display:ital@0;1&family=Space+Mono:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #03020a;
    --surface: rgba(255,255,255,0.04);
    --border: rgba(255,255,255,0.08);
    --accent1: #b388ff;
    --accent2: #64ffda;
    --accent3: #ff6e9c;
    --text: #e8e0ff;
    --muted: rgba(232,224,255,0.45);
    --glow1: rgba(179,136,255,0.15);
    --glow2: rgba(100,255,218,0.1);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    font-family: 'Syne', sans-serif;
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Animated cosmic background ── */
  .cosmos {
    position: fixed; inset: 0; z-index: 0; overflow: hidden;
  }
  .cosmos::before {
    content: '';
    position: absolute; inset: -50%;
    background: radial-gradient(ellipse 80% 60% at 20% 30%, rgba(100,255,218,0.07) 0%, transparent 60%),
                radial-gradient(ellipse 60% 80% at 80% 70%, rgba(179,136,255,0.1) 0%, transparent 60%),
                radial-gradient(ellipse 40% 40% at 50% 50%, rgba(255,110,156,0.05) 0%, transparent 60%);
    animation: nebula 18s ease-in-out infinite alternate;
  }
  @keyframes nebula {
    0% { transform: rotate(0deg) scale(1); }
    100% { transform: rotate(6deg) scale(1.08); }
  }
  .star { position: absolute; border-radius: 50%; background: white; animation: twinkle var(--d,3s) var(--delay,0s) infinite alternate; }
  @keyframes twinkle { 0%{opacity:0.1;transform:scale(0.8)} 100%{opacity:var(--op,0.7);transform:scale(1.2)} }

  /* ── Layout ── */
  .app {
    position: relative; z-index: 1;
    max-width: 760px; margin: 0 auto;
    padding: 60px 24px 120px;
  }

  /* ── Header ── */
  .header { margin-bottom: 56px; }
  .logo-wrap { display: flex; align-items: center; gap: 14px; margin-bottom: 8px; }
  .logo-icon {
    width: 48px; height: 48px; border-radius: 14px;
    background: linear-gradient(135deg, var(--accent1), var(--accent3));
    display: grid; place-items: center; font-size: 22px;
    box-shadow: 0 0 30px rgba(179,136,255,0.4);
    animation: pulse-logo 3s ease-in-out infinite;
  }
  @keyframes pulse-logo {
    0%,100%{box-shadow:0 0 30px rgba(179,136,255,0.4)}
    50%{box-shadow:0 0 60px rgba(179,136,255,0.7), 0 0 100px rgba(179,136,255,0.2)}
  }
  .logo-text {
    font-family: 'DM Serif Display', serif;
    font-size: 36px;
    background: linear-gradient(90deg, var(--accent1), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    letter-spacing: 4px;
  }
  .tagline { font-family:'Space Mono',monospace; font-size: 12px; color: var(--muted); letter-spacing:2px; margin-left: 62px; }

  /* ── Stats bar ── */
  .stats {
    display: flex; gap: 24px; margin-bottom: 40px;
    padding: 18px 24px; border-radius: 16px;
    background: var(--surface); border: 1px solid var(--border);
    backdrop-filter: blur(20px);
  }
  .stat { flex:1; text-align:center; }
  .stat-num { font-size: 28px; font-weight: 800; line-height:1; }
  .stat-num.total { color: var(--accent1); }
  .stat-num.done  { color: var(--accent2); }
  .stat-num.left  { color: var(--accent3); }
  .stat-label { font-size: 11px; color: var(--muted); letter-spacing:1.5px; margin-top:4px; }
  .stat-divider { width:1px; background: var(--border); }

  /* ── Progress ring ── */
  .progress-wrap {
    display: flex; align-items: center; gap: 20px;
    margin-bottom: 36px; padding: 20px 24px;
    border-radius: 16px; background: var(--surface);
    border: 1px solid var(--border); backdrop-filter: blur(20px);
  }
  .ring-svg { flex-shrink:0; }
  .ring-bg { fill:none; stroke: rgba(255,255,255,0.07); stroke-width:5; }
  .ring-fill {
    fill:none; stroke: url(#ringGrad); stroke-width:5;
    stroke-linecap: round; transition: stroke-dashoffset 0.8s cubic-bezier(.4,0,.2,1);
    transform: rotate(-90deg); transform-origin: center;
  }
  .ring-text { fill: var(--text); font-family:'Syne',sans-serif; font-weight:800; font-size:14px; text-anchor:middle; dominant-baseline:middle; }
  .progress-info { flex:1; }
  .progress-title { font-size:14px; font-weight:700; margin-bottom:4px; }
  .progress-sub { font-size:12px; color:var(--muted); }

  /* ── Input area ── */
  .input-section { margin-bottom: 32px; }
  .input-wrap {
    display: flex; gap: 12px; align-items: flex-end;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px; padding: 16px 16px 16px 20px;
    backdrop-filter: blur(20px);
    transition: border-color 0.3s, box-shadow 0.3s;
  }
  .input-wrap:focus-within {
    border-color: rgba(179,136,255,0.4);
    box-shadow: 0 0 0 3px rgba(179,136,255,0.1), 0 0 40px rgba(179,136,255,0.1);
  }
  .input-fields { flex:1; display:flex; flex-direction:column; gap:10px; }
  #taskInput {
    background: transparent; border:none; outline:none;
    font-family:'Syne',sans-serif; font-size:16px; font-weight:600;
    color: var(--text); width:100%;
  }
  #taskInput::placeholder { color: var(--muted); font-weight:400; }
  .input-meta { display:flex; gap:10px; }
  .meta-select {
    background: rgba(255,255,255,0.06); border: 1px solid var(--border);
    border-radius: 8px; color: var(--muted); font-family:'Syne',sans-serif;
    font-size:12px; padding: 5px 10px; cursor:pointer; outline:none;
    transition: all 0.2s;
  }
  .meta-select:focus { border-color: var(--accent1); color: var(--text); }
  .add-btn {
    background: linear-gradient(135deg, var(--accent1), var(--accent3));
    border: none; border-radius: 14px;
    width: 52px; height: 52px; cursor: pointer;
    font-size: 24px; display: grid; place-items: center;
    color: white; font-weight: 800;
    box-shadow: 0 4px 20px rgba(179,136,255,0.3);
    transition: all 0.2s;
    flex-shrink:0;
  }
  .add-btn:hover { transform:scale(1.08); box-shadow:0 8px 30px rgba(179,136,255,0.5); }
  .add-btn:active { transform:scale(0.95); }

  /* ── Filter tabs ── */
  .filters {
    display: flex; gap: 8px; margin-bottom: 28px;
    overflow-x: auto; padding-bottom: 4px;
  }
  .filters::-webkit-scrollbar { display:none; }
  .filter-btn {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 100px; padding: 9px 20px;
    font-family:'Syne',sans-serif; font-size:13px; font-weight:700;
    color: var(--muted); cursor:pointer; white-space:nowrap;
    transition: all 0.25s;
    backdrop-filter: blur(20px);
  }
  .filter-btn:hover { color:var(--text); border-color: rgba(255,255,255,0.2); }
  .filter-btn.active {
    background: linear-gradient(135deg, rgba(179,136,255,0.2), rgba(100,255,218,0.1));
    border-color: var(--accent1); color: var(--accent1);
    box-shadow: 0 0 20px rgba(179,136,255,0.2);
  }

  /* ── Tasks ── */
  .tasks-section { display:flex; flex-direction:column; gap:10px; }
  .section-label {
    font-family:'Space Mono',monospace; font-size:11px; color:var(--muted);
    letter-spacing:2px; padding-left:4px; margin-bottom:6px;
  }

  .task-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 18px; padding: 18px 20px;
    display: flex; align-items: flex-start; gap: 16px;
    backdrop-filter: blur(20px);
    transition: all 0.3s cubic-bezier(.4,0,.2,1);
    animation: slide-in 0.4s cubic-bezier(.4,0,.2,1);
    position: relative; overflow: hidden;
  }
  .task-card::before {
    content:''; position:absolute; left:0; top:0; bottom:0; width:3px;
    background: var(--card-accent, var(--accent1));
    border-radius:3px 0 0 3px;
  }
  .task-card:hover {
    transform: translateX(4px);
    border-color: rgba(255,255,255,0.15);
    box-shadow: 0 4px 30px rgba(179,136,255,0.1);
  }
  .task-card.done { opacity:0.5; }
  .task-card.done .task-text { text-decoration: line-through; color: var(--muted); }
  @keyframes slide-in {
    from { opacity:0; transform:translateY(20px) scale(0.97); }
    to   { opacity:1; transform:translateY(0) scale(1); }
  }

  .check-btn {
    width: 26px; height: 26px; border-radius: 50%; flex-shrink:0;
    border: 2px solid var(--card-accent, var(--accent1));
    background: transparent; cursor:pointer; margin-top:2px;
    display: grid; place-items: center; font-size: 14px;
    transition: all 0.3s; color: transparent;
  }
  .check-btn:hover { background: rgba(179,136,255,0.15); transform:scale(1.15); }
  .task-card.done .check-btn {
    background: var(--card-accent, var(--accent1));
    color: white; border-color: var(--card-accent, var(--accent1));
  }

  .task-body { flex:1; min-width:0; }
  .task-text { font-size:15px; font-weight:600; line-height:1.4; margin-bottom:6px; word-break:break-word; }
  .task-meta { display:flex; flex-wrap:wrap; gap:8px; align-items:center; }
  .task-tag {
    font-size:11px; font-family:'Space Mono',monospace;
    padding: 3px 10px; border-radius:100px;
    background: rgba(255,255,255,0.07); color: var(--muted); letter-spacing:1px;
  }
  .task-tag.priority-high { background:rgba(255,110,156,0.15); color:var(--accent3); }
  .task-tag.priority-medium { background:rgba(255,200,100,0.12); color:#ffc864; }
  .task-tag.priority-low { background:rgba(100,255,218,0.1); color:var(--accent2); }
  .task-date { font-size:11px; color:var(--muted); font-family:'Space Mono',monospace; }

  .task-actions { display:flex; gap:6px; opacity:0; transition:opacity 0.2s; flex-shrink:0; }
  .task-card:hover .task-actions { opacity:1; }
  .act-btn {
    background:rgba(255,255,255,0.06); border:1px solid var(--border);
    border-radius:8px; width:30px; height:30px; cursor:pointer;
    display:grid; place-items:center; font-size:14px;
    color:var(--muted); transition:all 0.2s;
  }
  .act-btn:hover { background:rgba(255,110,156,0.15); color:var(--accent3); border-color:rgba(255,110,156,0.3); }

  /* ── Empty state ── */
  .empty {
    text-align:center; padding: 80px 40px;
    font-family:'DM Serif Display',serif;
    animation: slide-in 0.5s ease;
  }
  .empty-icon { font-size:60px; margin-bottom:16px; opacity:0.5; }
  .empty h3 { font-size:22px; color:var(--muted); font-style:italic; }

  /* ── Confetti effect ── */
  .confetti { position:fixed; pointer-events:none; z-index:999; }
  .confetti-piece {
    position:absolute; width:8px; height:8px; border-radius:2px;
    animation: confetti-fall 1.2s ease-in forwards;
  }
  @keyframes confetti-fall {
    0%{transform:translateY(-20px) rotate(0deg);opacity:1}
    100%{transform:translateY(120px) rotate(360deg);opacity:0}
  }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar{width:5px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:10px}
</style>
</head>
<body>

<div class="cosmos" id="cosmos"></div>

<div class="app">
  <!-- Header -->
  <header class="header">
    <div class="logo-wrap">
      <div class="logo-icon">✦</div>
      <div class="logo-text">AURA</div>
    </div>
    <div class="tagline">// YOUR PERSONAL TASK UNIVERSE</div>
  </header>

  <!-- Stats -->
  <div class="stats">
    <div class="stat">
      <div class="stat-num total" id="totalCount">0</div>
      <div class="stat-label">TOTAL</div>
    </div>
    <div class="stat-divider"></div>
    <div class="stat">
      <div class="stat-num done" id="doneCount">0</div>
      <div class="stat-label">DONE</div>
    </div>
    <div class="stat-divider"></div>
    <div class="stat">
      <div class="stat-num left" id="leftCount">0</div>
      <div class="stat-label">REMAINING</div>
    </div>
  </div>

  <!-- Progress -->
  <div class="progress-wrap">
    <svg class="ring-svg" width="80" height="80" viewBox="0 0 80 80">
      <defs>
        <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#b388ff"/>
          <stop offset="100%" stop-color="#64ffda"/>
        </linearGradient>
      </defs>
      <circle class="ring-bg" cx="40" cy="40" r="33"/>
      <circle class="ring-fill" cx="40" cy="40" r="33" id="ringFill"
        stroke-dasharray="207.3" stroke-dashoffset="207.3"/>
      <text class="ring-text" x="40" y="41" id="ringText">0%</text>
    </svg>
    <div class="progress-info">
      <div class="progress-title" id="progressTitle">Ready to conquer the cosmos?</div>
      <div class="progress-sub" id="progressSub">Add your first task to begin the journey</div>
    </div>
  </div>

  <!-- Input -->
  <div class="input-section">
    <div class="input-wrap">
      <div class="input-fields">
        <input type="text" id="taskInput" placeholder="What needs to be done in your universe?" maxlength="200">
        <div class="input-meta">
          <select class="meta-select" id="catSelect">
            <option value="work">💼 Work</option>
            <option value="personal">🌙 Personal</option>
            <option value="health">💚 Health</option>
            <option value="creative">🎨 Creative</option>
            <option value="learning">📚 Learning</option>
          </select>
          <select class="meta-select" id="priSelect">
            <option value="high">🔴 High</option>
            <option value="medium">🟡 Medium</option>
            <option value="low">🟢 Low</option>
          </select>
        </div>
      </div>
      <button class="add-btn" onclick="addTask()" title="Add Task">+</button>
    </div>
  </div>

  <!-- Filters -->
  <div class="filters">
    <button class="filter-btn active" onclick="setFilter('all',this)">All Tasks</button>
    <button class="filter-btn" onclick="setFilter('active',this)">Active</button>
    <button class="filter-btn" onclick="setFilter('done',this)">Completed</button>
    <button class="filter-btn" onclick="setFilter('high',this)">🔴 High</button>
    <button class="filter-btn" onclick="setFilter('work',this)">💼 Work</button>
    <button class="filter-btn" onclick="setFilter('personal',this)">🌙 Personal</button>
    <button class="filter-btn" onclick="setFilter('health',this)">💚 Health</button>
  </div>

  <!-- Tasks -->
  <div class="tasks-section" id="taskList"></div>
</div>

<script>
let tasks = JSON.parse(localStorage.getItem('aura-tasks') || '[]');
let filter = 'all';

const ACCENT = { work:'#b388ff', personal:'#ff6e9c', health:'#64ffda', creative:'#ffca64', learning:'#69d2ff' };
const EMOJI  = { work:'💼', personal:'🌙', health:'💚', creative:'🎨', learning:'📚' };

function save() { localStorage.setItem('aura-tasks', JSON.stringify(tasks)); }

function addTask() {
  const text = document.getElementById('taskInput').value.trim();
  if (!text) { document.getElementById('taskInput').focus(); return; }
  const task = {
    id: Date.now(),
    text,
    category: document.getElementById('catSelect').value,
    priority: document.getElementById('priSelect').value,
    done: false,
    date: new Date().toLocaleDateString('en-US',{month:'short',day:'numeric'})
  };
  tasks.unshift(task);
  save();
  document.getElementById('taskInput').value = '';
  render();
}

function toggleTask(id) {
  const t = tasks.find(x=>x.id===id);
  if (!t) return;
  t.done = !t.done;
  save();
  if (t.done) spawnConfetti();
  render();
}

function deleteTask(id) {
  tasks = tasks.filter(x=>x.id!==id);
  save(); render();
}

function setFilter(f, btn) {
  filter = f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function filtered() {
  if (filter==='all') return tasks;
  if (filter==='active') return tasks.filter(t=>!t.done);
  if (filter==='done') return tasks.filter(t=>t.done);
  if (filter==='high') return tasks.filter(t=>t.priority==='high');
  return tasks.filter(t=>t.category===filter);
}

function render() {
  const total = tasks.length;
  const done  = tasks.filter(t=>t.done).length;
  const left  = total - done;
  const pct   = total ? Math.round(done/total*100) : 0;

  document.getElementById('totalCount').textContent = total;
  document.getElementById('doneCount').textContent  = done;
  document.getElementById('leftCount').textContent  = left;
  document.getElementById('ringText').textContent   = pct + '%';

  const circ = 207.3;
  document.getElementById('ringFill').style.strokeDashoffset = circ - (circ * pct/100);

  const titles = [
    [0,'Ready to conquer the cosmos?','Add your first task to begin'],
    [30,'Making stellar progress! ✦','Keep up the momentum'],
    [60,'Over halfway there! ⚡','You\'re doing amazing'],
    [90,'Almost at the stars! 🌟','Just a few more to go'],
    [100,'Universe conquered! 🎉','All tasks complete — you\'re a legend']
  ];
  const [,title,sub] = [...titles].reverse().find(([n])=>pct>=n);
  document.getElementById('progressTitle').textContent = title;
  document.getElementById('progressSub').textContent   = sub;

  const list = document.getElementById('taskList');
  const vis  = filtered();

  if (!vis.length) {
    list.innerHTML = `<div class="empty"><div class="empty-icon">✦</div><h3>${total?'Nothing here yet...':'Your universe awaits'}</h3></div>`;
    return;
  }

  list.innerHTML = vis.map(t => `
    <div class="task-card ${t.done?'done':''}" style="--card-accent:${ACCENT[t.category]||'#b388ff'}">
      <button class="check-btn" onclick="toggleTask(${t.id})" title="${t.done?'Undo':'Complete'}">${t.done?'✓':''}</button>
      <div class="task-body">
        <div class="task-text">${escHtml(t.text)}</div>
        <div class="task-meta">
          <span class="task-tag">${EMOJI[t.category]} ${t.category}</span>
          <span class="task-tag priority-${t.priority}">${t.priority} priority</span>
          <span class="task-date">${t.date}</span>
        </div>
      </div>
      <div class="task-actions">
        <button class="act-btn" onclick="deleteTask(${t.id})" title="Delete">✕</button>
      </div>
    </div>
  `).join('');
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function spawnConfetti() {
  const colors = ['#b388ff','#64ffda','#ff6e9c','#ffca64','#69d2ff'];
  const wrap = document.createElement('div');
  wrap.className = 'confetti';
  wrap.style.cssText = `left:${Math.random()*80+10}%;top:30%;`;
  for (let i=0;i<18;i++) {
    const p = document.createElement('div');
    p.className = 'confetti-piece';
    p.style.cssText = `
      left:${(Math.random()-0.5)*100}px;
      background:${colors[i%colors.length]};
      animation-delay:${Math.random()*0.4}s;
      transform:rotate(${Math.random()*360}deg);
    `;
    wrap.appendChild(p);
  }
  document.body.appendChild(wrap);
  setTimeout(()=>wrap.remove(),1800);
}

// Stars
function initCosmos() {
  const cosmos = document.getElementById('cosmos');
  for (let i=0;i<120;i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random()*2.5+0.5;
    s.style.cssText = `
      width:${size}px;height:${size}px;
      left:${Math.random()*100}%;top:${Math.random()*100}%;
      --d:${(Math.random()*4+2).toFixed(1)}s;
      --delay:${(Math.random()*4).toFixed(1)}s;
      --op:${(Math.random()*0.6+0.2).toFixed(2)};
    `;
    cosmos.appendChild(s);
  }
}

document.getElementById('taskInput').addEventListener('keydown', e => {
  if (e.key==='Enter') addTask();
});

initCosmos();
render();
</script>
</body>
</html>
